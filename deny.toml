[graph]
targets = []

[advisories]
version = 2
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "CC0-1.0",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

# Crypto crates — block accidental pulls of unmaintained alternatives
[[bans.deny]]
name = "openssl"
reason = "use rustls instead"

[[bans.deny]]
name = "openssl-sys"
reason = "use rustls instead"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
