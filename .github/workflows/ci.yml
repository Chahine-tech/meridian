name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: clippy (cluster features)
        run: cargo clippy --all-targets --features cluster -- -D warnings

      - name: clippy (cluster-http features)
        run: cargo clippy --all-targets --features cluster-http -- -D warnings

      - name: test
        run: cargo test

      - name: test (cluster features)
        run: cargo test --features cluster

  edge:
    name: Edge (WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: check
        run: cargo check -p meridian-edge --target wasm32-unknown-unknown

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install
        working-directory: crates/meridian-edge
        run: npm install

      - name: typecheck
        working-directory: crates/meridian-edge
        run: npx tsc --noEmit

  sdk:
    name: SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: install
        working-directory: packages/sdk
        run: bun install

      - name: lint
        working-directory: packages/sdk
        run: bun run lint

      - name: typecheck
        working-directory: packages/sdk
        run: bun run typecheck

      - name: test
        working-directory: packages/sdk
        run: bun test

  sdk-react:
    name: SDK React
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: install
        run: bun install

      - name: build sdk
        working-directory: packages/sdk
        run: bun run build

      - name: lint
        working-directory: packages/sdk-react
        run: bun run lint

      - name: typecheck
        working-directory: packages/sdk-react
        run: bun run typecheck

  devtools:
    name: Devtools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: install
        run: bun install

      - name: build sdk
        working-directory: packages/sdk
        run: bun run build

      - name: lint
        working-directory: packages/devtools
        run: bun run lint

      - name: typecheck
        working-directory: packages/devtools
        run: bun run typecheck
