name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: clippy (cluster features)
        run: cargo clippy --all-targets --features cluster -- -D warnings

      - name: clippy (cluster-http features)
        run: cargo clippy --all-targets --features cluster-http -- -D warnings

      - name: clippy (pg-sync features)
        run: cargo clippy --all-targets --features pg-sync -- -D warnings

      - name: test
        run: cargo test

      - name: test (cluster features)
        run: cargo test --features cluster

  wal-integration:
    name: WAL integration (pg-sync)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: runner
          POSTGRES_PASSWORD: runner
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: enable wal_level=logical
        env:
          PGPASSWORD: runner
        run: |
          psql -h localhost -U runner -d postgres \
            -c "ALTER SYSTEM SET wal_level = logical;"
          # Restart the container — wal_level requires a full restart
          docker restart $(docker ps -q --filter expose=5432)
          # Wait for Postgres to accept connections again
          for i in $(seq 1 20); do
            pg_isready -h localhost -U runner && break
            sleep 1
          done
          psql -h localhost -U runner -d postgres -c "SHOW wal_level;"

      - name: test WAL integration
        env:
          MERIDIAN_TEST_PG_URL: postgresql://runner:runner@localhost/postgres
        run: |
          cargo test --features pg-sync --test wal_replication_integration -- --test-threads=1

  edge:
    name: Edge (WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: check
        run: cargo check -p meridian-edge --target wasm32-unknown-unknown

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install
        working-directory: crates/meridian-edge
        run: npm install

      - name: typecheck
        working-directory: crates/meridian-edge
        run: npm run typecheck

  sdk:
    name: SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: install
        working-directory: packages/sdk
        run: bun install

      - name: lint
        working-directory: packages/sdk
        run: bun run lint

      - name: typecheck
        working-directory: packages/sdk
        run: bun run typecheck

      - name: test
        working-directory: packages/sdk
        run: bun test

  sdk-react:
    name: SDK React
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: install
        run: bun install

      - name: build sdk
        working-directory: packages/sdk
        run: bun run build

      - name: lint
        working-directory: packages/sdk-react
        run: bun run lint

      - name: typecheck
        working-directory: packages/sdk-react
        run: bun run typecheck

  devtools:
    name: Devtools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: install
        run: bun install

      - name: build sdk
        working-directory: packages/sdk
        run: bun run build

      - name: lint
        working-directory: packages/devtools
        run: bun run lint

      - name: typecheck
        working-directory: packages/devtools
        run: bun run typecheck

  cli:
    name: CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: install
        run: bun install

      - name: build sdk
        working-directory: packages/sdk
        run: bun run build

      - name: lint
        working-directory: packages/cli
        run: bun run lint

      - name: typecheck
        working-directory: packages/cli
        run: bun run typecheck

      - name: build
        working-directory: packages/cli
        run: bun run build

