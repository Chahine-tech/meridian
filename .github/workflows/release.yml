name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "rust-v*"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: install
        run: bun install

      # Build SDK first (sdk-react and devtools depend on it)
      - name: typecheck sdk
        working-directory: packages/sdk
        run: bun run typecheck

      - name: test sdk
        working-directory: packages/sdk
        run: bun test

      - name: build sdk
        working-directory: packages/sdk
        run: bun run build

      - name: typecheck sdk-react
        working-directory: packages/sdk-react
        run: bun run typecheck

      - name: build sdk-react
        working-directory: packages/sdk-react
        run: bun run build

      - name: typecheck devtools
        working-directory: packages/devtools
        run: bun run typecheck

      - name: build devtools
        working-directory: packages/devtools
        run: bun run build

      - name: typecheck cli
        working-directory: packages/cli
        run: bun run typecheck

      - name: build cli
        working-directory: packages/cli
        run: bun run build

      - name: Create Release PR or publish
        if: github.ref == 'refs/heads/main'
        uses: changesets/action@v1
        with:
          publish: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-meridian-core:
    name: Publish meridian-core
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/rust-v')
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: set version from git tag
        run: |
          VERSION=${GITHUB_REF_NAME#rust-v}
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" crates/meridian-core/Cargo.toml

      - name: publish
        working-directory: crates/meridian-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --allow-dirty

  publish-meridian-client:
    name: Publish meridian-client
    runs-on: ubuntu-latest
    needs: publish-meridian-core
    if: startsWith(github.ref, 'refs/tags/rust-v')
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: set version from git tag
        run: |
          VERSION=${GITHUB_REF_NAME#rust-v}
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" crates/meridian-core/Cargo.toml
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" crates/meridian-client/Cargo.toml
          sed -i "s/meridian-core = { version = \".*\"/meridian-core = { version = \"$VERSION\"/" crates/meridian-client/Cargo.toml

      # Wait for crates.io to index meridian-core before publishing the dependent
      - name: wait for crates.io index
        run: sleep 60

      - name: publish
        working-directory: crates/meridian-client
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --allow-dirty

  server:
    name: Build server binaries
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: meridian-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: meridian-macos-aarch64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install musl tools (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/meridian ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
