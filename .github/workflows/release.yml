name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "rust-v*"
      - "python-sdk-v*"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: install
        run: bun install

      # Build SDK first (sdk-react and devtools depend on it)
      - name: typecheck sdk
        working-directory: packages/sdk
        run: bun run typecheck

      - name: test sdk
        working-directory: packages/sdk
        run: bun test

      - name: build sdk
        working-directory: packages/sdk
        run: bun run build

      - name: typecheck sdk-react
        working-directory: packages/sdk-react
        run: bun run typecheck

      - name: build sdk-react
        working-directory: packages/sdk-react
        run: bun run build

      - name: typecheck devtools
        working-directory: packages/devtools
        run: bun run typecheck

      - name: build devtools
        working-directory: packages/devtools
        run: bun run build

      - name: typecheck cli
        working-directory: packages/cli
        run: bun run typecheck

      - name: build cli
        working-directory: packages/cli
        run: bun run build

      - name: Create Release PR or publish
        if: github.ref == 'refs/heads/main'
        uses: changesets/action@v1
        with:
          publish: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-meridian-core:
    name: Publish meridian-core
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/rust-v')
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: set version from git tag
        run: |
          VERSION=${GITHUB_REF_NAME#rust-v}
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" crates/meridian-core/Cargo.toml

      - name: publish
        working-directory: crates/meridian-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --allow-dirty

  publish-meridian-client:
    name: Publish meridian-client
    runs-on: ubuntu-latest
    needs: publish-meridian-core
    if: startsWith(github.ref, 'refs/tags/rust-v')
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: set version from git tag
        run: |
          VERSION=${GITHUB_REF_NAME#rust-v}
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" crates/meridian-core/Cargo.toml
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" crates/meridian-client/Cargo.toml
          sed -i "s/meridian-core = { version = \".*\"/meridian-core = { version = \"$VERSION\"/" crates/meridian-client/Cargo.toml

      # Wait for crates.io to index meridian-core before publishing the dependent
      - name: wait for crates.io index
        run: sleep 60

      - name: publish
        working-directory: crates/meridian-client
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --allow-dirty

  server:
    name: Build server binaries
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: meridian-linux-x86_64
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: meridian-linux-aarch64
            use_cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: meridian-macos-aarch64
            use_cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install cross (ARM64 Linux)
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release -p meridian-server --target ${{ matrix.target }}
          else
            cargo build --release -p meridian-server --target ${{ matrix.target }}
          fi

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/meridian ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: server
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release and attach binaries
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/meridian-linux-x86_64/meridian-linux-x86_64
            artifacts/meridian-linux-aarch64/meridian-linux-aarch64
            artifacts/meridian-macos-aarch64/meridian-macos-aarch64

  docker:
    name: Docker image (${{ matrix.variant }})
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - variant: sled
            features: ""
            suffix: ""
          - variant: cluster
            features: cluster
            suffix: -cluster
          - variant: pg
            features: pg-sync
            suffix: -pg
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}${{ matrix.suffix }}
            type=semver,pattern={{major}}.{{minor}}${{ matrix.suffix }}
            type=raw,value=latest${{ matrix.suffix }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: FEATURES=${{ matrix.features }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

  publish-python-sdk:
    name: Publish Python SDK to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/python-sdk-v')
    permissions:
      id-token: write  # required for PyPI trusted publishing (OIDC, no token needed)
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#python-sdk-v}
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" packages/python/pyproject.toml

      - name: test
        run: uv run --extra crypto pytest packages/python/ -q

      - name: build
        run: uv build --package meridian-crdt --out-dir dist/

      - name: publish
        run: uv publish dist/*
