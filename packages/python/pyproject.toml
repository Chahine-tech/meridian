[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "meridian-crdt"
version = "0.1.0"
description = "Python client for Meridian — real-time CRDTs over WebSocket"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "websockets>=13",
    "msgpack>=1.1",
]

[project.optional-dependencies]
crypto = ["cryptography>=42"]

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "ruff>=0.6",
    "ty>=0.0.1a1",
]

[tool.hatch.build.targets.wheel]
packages = ["src/meridian"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "RUF", "ASYNC"]
ignore = ["B008"]

[tool.ty]
python-version = "3.12"
